const REST_BETWEEN_SETS = 90;

let state = { phase: 0, day: 0, progress: {}, showInstall: true, history: {} };
const STORAGE_KEY = "calisthenics_progress_v2";

// ISO week key like "2026-W25" so each week's checkmarks are independent
function getWeekKey(date = new Date()) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.phase = parsed.phase || 0;
      state.day = parsed.day || 0;
      state.progress = parsed.progress || {};
      state.showInstall = parsed.showInstall !== false;
      state.history = parsed.history || {};
    } else {
      // migrate old key if present
      const old = localStorage.getItem("toji_progress_v1");
      if (old) {
        const op = JSON.parse(old);
        state.phase = op.phase || 0;
        state.day = op.day || 0;
        state.showInstall = op.showInstall !== false;
      }
    }
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      phase: state.phase, day: state.day, progress: state.progress,
      showInstall: state.showInstall, history: state.history
    }));
  } catch(e) {}
}
loadState();

// progress key now includes the current week, so each week starts fresh
function progKey(p, d, ei, si) { return `${getWeekKey()}|${p}-${d}-${ei}-${si}`; }

// Called whenever a day's sets reach 100% — logs a completion into history
function logDayCompletionIfFull(p, d) {
  const completion = dayCompletion(p, d);
  const dayObj = PHASES[p].days[d];
  if (dayObj.rest) return;
  const wk = getWeekKey();
  const histKey = `${p}-${d}`;
  if (!state.history[histKey]) state.history[histKey] = {};
  if (completion >= 1) {
    state.history[histKey][wk] = true;
  } else {
    delete state.history[histKey][wk];
  }
}

function completedWeeksCount(p, d) {
  const histKey = `${p}-${d}`;
  const h = state.history[histKey];
  if (!h) return 0;
  return Object.keys(h).length;
}

let timerState = null;

function startTimer(kind, seconds, exName) {
  stopTimerInterval();
  timerState = { kind, seconds, total: seconds, exName, running: true, interval: null };
  render();
  timerState.interval = setInterval(() => {
    if (!timerState) return;
    if (timerState.running) {
      timerState.seconds -= 1;
      if (timerState.seconds <= 0) {
        playBeep();
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        if (window._pendingTimerKey) {
          state.progress[window._pendingTimerKey] = true;
          window._pendingTimerKey = null;
          logDayCompletionIfFull(state.phase, state.day);
          saveState();
        }
        stopTimerInterval();
        timerState = null;
        render();
        return;
      }
      renderTimerOnly();
    }
  }, 1000);
}
function stopTimerInterval() {
  if (timerState && timerState.interval) clearInterval(timerState.interval);
}
function closeTimer() {
  stopTimerInterval();
  timerState = null;
  render();
}
function toggleTimerPause() {
  if (timerState) {
    timerState.running = !timerState.running;
    renderTimerOnly();
  }
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function getCurrentPhase() { return PHASES[state.phase]; }
function getCurrentDay() { return getCurrentPhase().days[state.day]; }

function dayCompletion(p, d) {
  const day = PHASES[p].days[d];
  if (day.rest) return 1;
  let total = 0, done = 0;
  day.exercises.forEach((ex, ei) => {
    for (let si = 0; si < ex.sets; si++) {
      total++;
      if (state.progress[progKey(p, d, ei, si)]) done++;
    }
  });
  return total === 0 ? 0 : done / total;
}

function render() {
  document.documentElement.style.setProperty('--accent', getCurrentPhase().accent);
  const app = document.getElementById('app');

  if (timerState) {
    app.innerHTML = renderTimerOverlay();
    attachTimerHandlers();
    return;
  }

  const phase = getCurrentPhase();
  const day = getCurrentDay();
  const completion = dayCompletion(state.phase, state.day);

  let html = `
    <div class="topbar">
      <div class="brand">CALI<span>·</span>STHENICS</div>
      <div class="phase-pill">${phase.weeks}</div>
    </div>

    ${state.showInstall ? `
    <div class="install-banner">
      <span><b>Add to Home Screen:</b> tap Share → "Add to Home Screen" for app-like access.</span>
      <button class="install-x" id="dismissInstall">×</button>
    </div>` : ''}

    <div class="phase-nav">
      ${PHASES.map((p, i) => `
        <button class="phase-btn ${i === state.phase ? 'active' : ''}" data-phase="${i}">
          <div class="pnum">Phase ${p.id}</div>
          <div class="pname">${p.name}</div>
        </button>
      `).join('')}
    </div>

    <div class="day-nav">
      ${phase.days.map((d, i) => {
        const c = dayCompletion(state.phase, i);
        return `<button class="day-btn ${i === state.day ? 'active' : ''}" data-day="${i}">
          ${d.day.slice(0,3)}${c >= 1 && !d.rest ? '<span class="done-dot"></span>' : ''}
        </button>`;
      }).join('')}
    </div>

    <div class="main">
  `;

  if (day.rest) {
    html += `
      <div class="rest-view">
        <div class="rest-icon">◼</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">Muscle is built during recovery, not during training.</div>
      </div>
    `;
  } else {
    html += `
      <div class="day-header">
        <div class="label">${day.day}</div>
        <div class="name">${day.name}</div>
        <div class="focus">${day.focus}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${completion*100}%"></div></div>
        <div class="streak-badge">${completedWeeksCount(state.phase, state.day)} week${completedWeeksCount(state.phase, state.day) === 1 ? '' : 's'} completed on this day</div>
      </div>
    `;

    day.exercises.forEach((ex, ei) => {
      const setsArr = Array.from({length: ex.sets});
      const allDone = setsArr.every((_, si) => state.progress[progKey(state.phase, state.day, ei, si)]);
      html += `
        <div class="ex-card ${allDone ? 'complete' : ''}">
          <div class="ex-main">
            <div class="ex-info">
              <div class="ex-name-row">
                <span class="ex-name">${ex.name}</span>
                ${ex.tag ? `<span class="ex-tag">${ex.tag}</span>` : ''}
              </div>
              ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
            </div>
            <div class="ex-sets-label">${ex.sets} × ${ex.type === 'timed' ? ex.duration + 's' : ex.target}</div>
          </div>
          <div class="set-row">
            ${setsArr.map((_, si) => {
              const done = state.progress[progKey(state.phase, state.day, ei, si)];
              if (ex.type === 'timed') {
                return `<button class="set-chip timed ${done ? 'done' : ''}" data-action="timer" data-ei="${ei}" data-si="${si}" data-dur="${ex.duration}" data-name="${ex.name}">
                  <span class="t">${si+1}</span><span>${ex.duration}s</span>
                </button>`;
              }
              return `<button class="set-chip ${done ? 'done' : ''}" data-action="toggle" data-ei="${ei}" data-si="${si}">
                ${si+1}
              </button>`;
            }).join('')}
          </div>
        </div>
      `;
    });

    html += `<div style="height: 90px"></div>`;
  }

  html += `</div>`;

  if (!day.rest) {
    html += `
      <div class="footer-action">
        <button class="complete-btn" id="restTimerBtn">Start rest timer (90s)</button>
      </div>
    `;
  }

  app.innerHTML = html;
  attachHandlers();
}

function renderTimerOnly() {
  const app = document.getElementById('app');
  const numEl = app.querySelector('.timer-num');
  const ring = app.querySelector('.ring-progress');
  if (numEl) numEl.textContent = formatTime(timerState.seconds);
  if (ring) {
    const pct = timerState.seconds / timerState.total;
    const circumference = 2 * Math.PI * 110;
    ring.style.strokeDashoffset = circumference * (1 - pct);
  }
  const playBtn = app.querySelector('.timer-btn.primary');
  if (playBtn) playBtn.textContent = timerState.running ? '❙❙' : '▶';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function renderTimerOverlay() {
  const accent = getCurrentPhase().accent;
  const circumference = 2 * Math.PI * 110;
  const pct = timerState.seconds / timerState.total;
  const isRest = timerState.kind === 'rest';
  return `
    <div class="timer-overlay">
      <button class="timer-close" id="timerClose">Close</button>
      <div class="timer-kind" style="color:${isRest ? '#888' : accent}">${isRest ? 'REST' : 'HOLD'}</div>
      <div class="timer-exname">${timerState.exName}</div>
      <div class="timer-ring-wrap">
        <svg width="260" height="260">
          <circle cx="130" cy="130" r="110" fill="none" stroke="#1c1c1c" stroke-width="10"/>
          <circle class="ring-progress" cx="130" cy="130" r="110" fill="none"
            stroke="${isRest ? '#888' : accent}" stroke-width="10"
            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference * (1-pct)}"
            stroke-linecap="round" style="transition: stroke-dashoffset 1s linear"/>
        </svg>
        <div class="timer-num">${formatTime(timerState.seconds)}</div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerReset">↺</button>
        <button class="timer-btn primary" id="timerPause">${timerState.running ? '❙❙' : '▶'}</button>
        <button class="timer-btn" id="timerAdd">+15</button>
      </div>
      <button class="timer-skip" id="timerSkip">Skip</button>
    </div>
  `;
}

function attachHandlers() {
  document.querySelectorAll('[data-phase]').forEach(el => {
    el.onclick = () => { state.phase = parseInt(el.dataset.phase); state.day = 0; saveState(); render(); };
  });
  document.querySelectorAll('[data-day]').forEach(el => {
    el.onclick = () => { state.day = parseInt(el.dataset.day); saveState(); render(); };
  });
  document.querySelectorAll('[data-action="toggle"]').forEach(el => {
    el.onclick = () => {
      const key = progKey(state.phase, state.day, el.dataset.ei, el.dataset.si);
      state.progress[key] = !state.progress[key];
      logDayCompletionIfFull(state.phase, state.day);
      saveState();
      render();
    };
  });
  document.querySelectorAll('[data-action="timer"]').forEach(el => {
    el.onclick = () => {
      const key = progKey(state.phase, state.day, el.dataset.ei, el.dataset.si);
      window._pendingTimerKey = key;
      startTimer('hold', parseInt(el.dataset.dur), el.dataset.name);
    };
  });
  const restBtn = document.getElementById('restTimerBtn');
  if (restBtn) restBtn.onclick = () => startTimer('rest', REST_BETWEEN_SETS, getCurrentDay().name);
  const dismissBtn = document.getElementById('dismissInstall');
  if (dismissBtn) dismissBtn.onclick = () => { state.showInstall = false; saveState(); render(); };
}

function attachTimerHandlers() {
  document.getElementById('timerClose').onclick = closeTimer;
  document.getElementById('timerPause').onclick = toggleTimerPause;
  document.getElementById('timerReset').onclick = () => {
    timerState.seconds = timerState.total;
    renderTimerOnly();
  };
  document.getElementById('timerAdd').onclick = () => {
    timerState.seconds += 15;
    timerState.total += 15;
    renderTimerOnly();
  };
  document.getElementById('timerSkip').onclick = () => {
    if (timerState.kind === 'hold' && window._pendingTimerKey) {
      state.progress[window._pendingTimerKey] = true;
      window._pendingTimerKey = null;
      logDayCompletionIfFull(state.phase, state.day);
      saveState();
    }
    closeTimer();
  };
}

render();
</script>
</body>
</html>
