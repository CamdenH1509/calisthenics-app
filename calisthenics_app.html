const REST_BETWEEN_SETS = 90;

let state = { phase: 0, day: 0, progress: {}, showInstall: true, history: {}, activeTab: 'workout', profile: {} };
const STORAGE_KEY = "calisthenics_progress_v2";

// ISO week key like "2026-W25" so each week's checkmarks are independent
function getWeekKey(date = new Date()) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.phase = parsed.phase || 0;
      state.day = parsed.day || 0;
      state.progress = parsed.progress || {};
      state.showInstall = parsed.showInstall !== false;
      state.history = parsed.history || {};
      state.activeTab = parsed.activeTab || 'workout';
      state.profile = parsed.profile || {};
    } else {
      // migrate old key if present
      const old = localStorage.getItem("toji_progress_v1");
      if (old) {
        const op = JSON.parse(old);
        state.phase = op.phase || 0;
        state.day = op.day || 0;
        state.showInstall = op.showInstall !== false;
      }
    }
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      phase: state.phase, day: state.day, progress: state.progress,
      showInstall: state.showInstall, history: state.history,
      activeTab: state.activeTab, profile: state.profile
    }));
  } catch(e) {}
}
loadState();

// progress key now includes the current week, so each week starts fresh
function progKey(p, d, ei, si) { return `${getWeekKey()}|${p}-${d}-${ei}-${si}`; }

// Called whenever a day's sets reach 100% — logs a completion into history
function logDayCompletionIfFull(p, d, wasAlreadyComplete) {
  const completion = dayCompletion(p, d);
  const dayObj = PHASES[p].days[d];
  if (dayObj.rest) return;
  const wk = getWeekKey();
  const dk = getTodayKey();
  const histKey = `${p}-${d}`;
  if (!state.history[histKey]) state.history[histKey] = {};
  if (completion >= 1) {
    const alreadyLogged = !!state.history[histKey][wk];
    state.history[histKey][wk] = dk; // store date string instead of true
    if (!alreadyLogged && !wasAlreadyComplete) {
      setTimeout(() => { playFanfare(); launchConfetti(); }, 100);
    }
  } else {
    delete state.history[histKey][wk];
  }
}

function completedWeeksCount(p, d) {
  const histKey = `${p}-${d}`;
  const h = state.history[histKey];
  if (!h) return 0;
  return Object.keys(h).length;
}

function isBilateral(ex) {
  const haystack = ((ex.note || '') + ' ' + (ex.target || '')).toLowerCase();
  return haystack.includes('each side') || haystack.includes('each');

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// Keep audio context warm on any user interaction
document.addEventListener('touchstart', () => { if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume(); }, { passive: true });
document.addEventListener('click', () => { if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume(); }, { passive: true });

// Play a silent buffer every tick to keep AudioContext alive on iOS
function keepAudioAlive() {
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

// Chime: three-tone ascending bell — plays when a hold/exercise SET completes
function playChime() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    [[0, 660, 0.25], [0.18, 880, 0.2], [0.36, 1100, 0.15]].forEach(([t, freq, vol]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol, now + t);
      g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.6);
      o.start(now + t);
      o.stop(now + t + 0.7);
    });
    if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
  } catch(e) {}
}

// Countdown beep — low for seconds 4-2, high for last second before transition
function playCountdownBeep(secondsLeft) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const isLast = secondsLeft === 1;
    const freq = isLast ? 1200 : 400;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o.start(now);
    o.stop(now + 0.18);
    if (isLast && navigator.vibrate) navigator.vibrate(80);
  } catch(e) {}
}

// No-op stubs — pre-scheduling removed, chimes fire directly in tick()
function scheduleEndChime() {}
function cancelScheduledChime() {}
function playFanfare() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const notes = [
      [0,    523, 0.3, 'square'],
      [0.12, 659, 0.3, 'square'],
      [0.24, 784, 0.3, 'square'],
      [0.38, 1047,0.4, 'square'],
      [0.38, 784, 0.3, 'square'],
      [0.6,  1047,0.5, 'square'],
    ];
    notes.forEach(([t, freq, vol, type]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol * 0.3, now + t);
      g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.25);
      o.start(now + t);
      o.stop(now + t + 0.3);
    });
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  } catch(e) {}
}

// Confetti burst
function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const accent = getCurrentPhase().accent;
  const colors = [accent, '#fff', '#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#f0ede8'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 200,
    w: 6 + Math.random() * 8,
    h: 10 + Math.random() * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.2,
    vy: 3 + Math.random() * 5,
    vx: (Math.random() - 0.5) * 4,
    opacity: 1,
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed; p.vy += 0.15;
      if (frame > 80) p.opacity -= 0.015;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 140) requestAnimationFrame(draw);
    else canvas.remove();
  }
  requestAnimationFrame(draw);
}

// ===== TIMER PHASES =====
// getready -> side1 -> switch -> side2 -> DONE  (bilateral)
// getready -> hold -> DONE                       (unilateral)
// rest -> DONE                                   (rest, no getready)
const SWITCH_BREAK = 5;
const GETREADY_BREAK = 5;

function startTimer(kind, seconds, exName, bilateral = false) {
  stopTimerInterval();
  cancelScheduledChime();
  timerState = {
    kind,
    phase: 'getready',
    seconds: GETREADY_BREAK,
    total: GETREADY_BREAK,
    exName,
    bilateral,
    holdDuration: seconds,
    running: true,
    interval: null
  };
  render();
  timerState.interval = setInterval(tick, 1000);
}

function tick() {
  if (!timerState || !timerState.running) return;
  keepAudioAlive(); // ping AudioContext every second to prevent iOS suspension
  timerState.seconds -= 1;
  const s = timerState.seconds;
  const phase = timerState.phase;

  // During countdown phases (getready, switch): play beep on each second
  if (phase === 'getready' || phase === 'switch') {
    if (s > 0) {
      playCountdownBeep(s);
      renderTimerOnly();
      return;
    }
    // s === 0: countdown done, transition to next phase
    if (phase === 'getready') {
      timerState.phase = timerState.bilateral ? 'side1' : 'hold';
      timerState.seconds = timerState.holdDuration;
      timerState.total = timerState.holdDuration;
    } else {
      timerState.phase = 'side2';
      timerState.seconds = timerState.holdDuration;
      timerState.total = timerState.holdDuration;
    }
    renderTimerOnly();
    return;
  }

  // During hold phases: just tick down
  if (s > 0) {
    renderTimerOnly();
    return;
  }

  // s === 0 in a hold phase: play chime and transition
  if (phase === 'side1') {
    playChime();
    timerState.phase = 'switch';
    timerState.seconds = SWITCH_BREAK;
    timerState.total = SWITCH_BREAK;
    renderTimerOnly();
    return;
  }

  // hold, side2, or rest — fully done
  playChime();
  if (window._pendingTimerKey) {
    const wasComplete = dayCompletion(state.phase, state.day) >= 1;
    state.progress[window._pendingTimerKey] = true;
    window._pendingTimerKey = null;
    logDayCompletionIfFull(state.phase, state.day, wasComplete);
    saveState();
  }
  stopTimerInterval();
  timerState = null;
  render();
}

// Schedule chime using AudioContext clock — fires reliably even when JS timer drifts or iOS suspends setInterval
let _scheduledChimeNode = null;
function scheduleEndChime(secondsFromNow) {
  try {
    cancelScheduledChime();
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const fireAt = now + secondsFromNow;
    const freqs = [[0, 660, 0.25], [0.18, 880, 0.2], [0.36, 1100, 0.15]];
    freqs.forEach(([t, freq, vol]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.001, fireAt + t);
      g.gain.linearRampToValueAtTime(vol, fireAt + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, fireAt + t + 0.6);
      o.start(fireAt + t);
      o.stop(fireAt + t + 0.7);
      if (t === 0) _scheduledChimeNode = o;
    });
  } catch(e) {}
}

function cancelScheduledChime() {
  try { if (_scheduledChimeNode) { _scheduledChimeNode.stop(); _scheduledChimeNode = null; } } catch(e) { _scheduledChimeNode = null; }
}

function stopTimerInterval() {
  if (timerState && timerState.interval) clearInterval(timerState.interval);
}
function closeTimer() {
  stopTimerInterval();
  cancelScheduledChime();
  timerState = null;
  render();
}
function toggleTimerPause() {
  if (timerState) {
    timerState.running = !timerState.running;
    renderTimerOnly();
  }
}

function getCurrentPhase() { return PHASES[state.phase]; }
function getCurrentDay() { return getCurrentPhase().days[state.day]; }

function dayCompletion(p, d) {
  const day = PHASES[p].days[d];
  if (day.rest) return 1;
  let total = 0, done = 0;
  day.exercises.forEach((ex, ei) => {
    for (let si = 0; si < ex.sets; si++) {
      total++;
      if (state.progress[progKey(p, d, ei, si)]) done++;
    }
  });
  return total === 0 ? 0 : done / total;
}

function getPhaseLabel() {
  if (!timerState) return '';
  if (timerState.phase === 'getready') return 'GET READY';
  if (timerState.phase === 'side1') return 'SIDE 1';
  if (timerState.phase === 'switch') return 'SWITCH SIDES';
  if (timerState.phase === 'side2') return 'SIDE 2';
  if (timerState.phase === 'rest') return 'REST';
  return 'HOLD';
}

function getPhaseColor() {
  const accent = getCurrentPhase().accent;
  if (timerState.phase === 'getready') return '#888';
  if (timerState.phase === 'switch') return '#f39c12';
  if (timerState.phase === 'rest') return '#888';
  return accent;
}

function renderTimerOnly() {
  const app = document.getElementById('app');
  const numEl = app.querySelector('.timer-num');
  const ring = app.querySelector('.ring-progress');
  const kindEl = app.querySelector('.timer-kind');
  if (numEl) numEl.textContent = formatTime(timerState.seconds);
  if (ring) {
    const pct = timerState.seconds / timerState.total;
    const circumference = 2 * Math.PI * 110;
    ring.style.strokeDashoffset = circumference * (1 - pct);
    ring.style.stroke = getPhaseColor();
  }
  if (kindEl) {
    kindEl.textContent = getPhaseLabel();
    kindEl.style.color = getPhaseColor();
  }
  const playBtn = app.querySelector('.timer-btn.primary');
  if (playBtn) playBtn.textContent = timerState.running ? '❙❙' : '▶';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function renderTimerOverlay() {
  const accent = getCurrentPhase().accent;
  const circumference = 2 * Math.PI * 110;
  const pct = timerState.seconds / timerState.total;
  const color = getPhaseColor();
  const label = getPhaseLabel();
  return `
    <div class="timer-overlay">
      <button class="timer-close" id="timerClose">Close</button>
      <div class="timer-kind" style="color:${color}">${label}</div>
      <div class="timer-exname">${timerState.exName}</div>
      <div class="timer-ring-wrap">
        <svg width="260" height="260">
          <circle cx="130" cy="130" r="110" fill="none" stroke="#1c1c1c" stroke-width="10"/>
          <circle class="ring-progress" cx="130" cy="130" r="110" fill="none"
            stroke="${color}" stroke-width="10"
            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference * (1-pct)}"
            stroke-linecap="round" style="transition: stroke-dashoffset 1s linear"/>
        </svg>
        <div class="timer-num">${formatTime(timerState.seconds)}</div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerReset">↺</button>
        <button class="timer-btn primary" id="timerPause">${timerState.running ? '❙❙' : '▶'}</button>
        <button class="timer-btn" id="timerAdd">+15</button>
      </div>
      <button class="timer-skip" id="timerSkip">Skip</button>
    </div>
  `;
}

function attachHandlers() {
  document.querySelectorAll('[data-phase]').forEach(el => {
    el.onclick = () => { state.phase = parseInt(el.dataset.phase); state.day = 0; saveState(); render(); };
  });
  document.querySelectorAll('[data-day]').forEach(el => {
    el.onclick = () => { state.day = parseInt(el.dataset.day); saveState(); render(); };
  });
  document.querySelectorAll('[data-action="toggle"]').forEach(el => {
    el.onclick = () => {
      const key = progKey(state.phase, state.day, el.dataset.ei, el.dataset.si);
      const wasComplete = dayCompletion(state.phase, state.day) >= 1;
      const isChecking = !state.progress[key];
      state.progress[key] = isChecking;
      if (isChecking) playChime();
      logDayCompletionIfFull(state.phase, state.day, wasComplete);
      saveState();
      render();
    };
  });
  document.querySelectorAll('[data-action="timer"]').forEach(el => {
    el.onclick = () => {
      const key = progKey(state.phase, state.day, el.dataset.ei, el.dataset.si);
      window._pendingTimerKey = key;
      const bilateral = el.dataset.bilateral === 'true';
      startTimer('hold', parseInt(el.dataset.dur), el.dataset.name, bilateral);
    };
  });
  const restBtn = document.getElementById('restTimerBtn');
  if (restBtn) restBtn.onclick = () => {
    stopTimerInterval();
    timerState = { kind: 'rest', phase: 'rest', seconds: REST_BETWEEN_SETS, total: REST_BETWEEN_SETS, exName: getCurrentDay().name, bilateral: false, holdDuration: REST_BETWEEN_SETS, running: true, interval: null };
    render();
    timerState.interval = setInterval(tick, 1000);
  };
  const dismissBtn = document.getElementById('dismissInstall');
  if (dismissBtn) dismissBtn.onclick = () => { state.showInstall = false; saveState(); render(); };
  const settingsBtn = document.getElementById('settingsBtn');
  if (settingsBtn) settingsBtn.onclick = () => { showSettings = true; render(); };
  if (showSettings) attachSettingsHandlers();
  const habitTab = document.getElementById('habitTabBtn');
  if (habitTab) habitTab.onclick = () => { state.activeTab = 'habit'; saveState(); render(); };
  const workoutTab = document.getElementById('workoutTabBtn');
  if (workoutTab) workoutTab.onclick = () => { state.activeTab = 'workout'; saveState(); render(); };
}

function attachTimerHandlers() {
  document.getElementById('timerClose').onclick = closeTimer;
  document.getElementById('timerPause').onclick = toggleTimerPause;
  document.getElementById('timerReset').onclick = () => {
    if (timerState.phase === 'getready') {
      timerState.seconds = GETREADY_BREAK;
      timerState.total = GETREADY_BREAK;
      scheduleEndChime(GETREADY_BREAK + timerState.holdDuration);
    } else if (timerState.phase === 'side2') {
      timerState.seconds = timerState.holdDuration;
      timerState.total = timerState.holdDuration;
      scheduleEndChime(timerState.holdDuration);
    } else if (timerState.phase === 'switch') {
      timerState.seconds = SWITCH_BREAK;
      timerState.total = SWITCH_BREAK;
      scheduleEndChime(SWITCH_BREAK + timerState.holdDuration);
    } else {
      timerState.seconds = timerState.total;
      scheduleEndChime(timerState.total);
    }
    renderTimerOnly();
  };
  document.getElementById('timerAdd').onclick = () => {
    timerState.seconds += 15;
    timerState.total += 15;
    // Reschedule chime for the new end time
    if (timerState.phase === 'hold' || timerState.phase === 'side1' || timerState.phase === 'side2') {
      scheduleEndChime(timerState.seconds);
    }
    renderTimerOnly();
  };
  document.getElementById('timerSkip').onclick = () => {
    if (timerState.kind === 'hold' && window._pendingTimerKey) {
      const wasComplete = dayCompletion(state.phase, state.day) >= 1;
      state.progress[window._pendingTimerKey] = true;
      window._pendingTimerKey = null;
      playChime();
      logDayCompletionIfFull(state.phase, state.day, wasComplete);
      saveState();
    }
    closeTimer();
  };
}

// ===================== CALORIE ESTIMATION =====================
const EXERCISE_METS = {
  'push-up': 3.8, 'pike push': 4.2, 'archer push': 5.0, 'decline push': 4.5,
  'diamond push': 4.0, 'wide push': 3.8, 'pseudo planche': 5.5, 'dip': 4.5,
  'pull-up': 5.0, 'chin-up': 5.0, 'commando': 5.5, 'inverted row': 4.0,
  'scapular': 3.0, 'typewriter': 6.0, 'explosive pull': 6.5, 'negative': 4.0,
  'false grip': 3.5, 'muscle-up': 7.0, 'weighted pull': 6.0, 'chest-to-bar': 6.0,
  'burpee': 8.0, 'plank': 3.5, 'side plank': 3.0, 'hollow body': 3.5,
  'hanging': 4.0, 'windshield': 5.0, 'dragon flag': 6.0, 'l-sit': 5.0,
  'handstand': 4.5, 'wall hspu': 6.0, 'wall walk': 5.5,
};

function getMET(exName) {
  const lower = exName.toLowerCase();
  for (const [key, met] of Object.entries(EXERCISE_METS)) {
    if (lower.includes(key)) return met;
  }
  return 4.0;
}

function estimateDayCalories(phaseIdx, dayIdx) {
  const day = PHASES[phaseIdx].days[dayIdx];
  if (day.rest || !day.exercises) return 0;
  const p = state.profile;
  const weightKg = p.weight ? (p.unit === 'lbs' ? p.weight * 0.453592 : parseFloat(p.weight)) : 75;
  const ageYrs = p.age ? parseFloat(p.age) : 25;
  const isMale = p.gender !== 'female';
  const heightCm = p.height ? (p.heightUnit === 'ft' ? parseFloat(p.height) * 30.48 : parseFloat(p.height)) : 175;
  let totalCals = 0;
  day.exercises.forEach(ex => {
    const met = getMET(ex.name);
    let durationMins;
    if (ex.type === 'timed') {
      const dur = isBilateral(ex) ? ex.duration * 2 + 5 : ex.duration;
      durationMins = (dur * ex.sets) / 60;
    } else {
      durationMins = ex.sets * 2.5;
    }
    totalCals += met * weightKg * (durationMins / 60);
  });
  return Math.round(totalCals * 1.1);
}

    <div class="modal-overlay" id="settingsOverlay">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Profile Settings</div>
          <button class="modal-close" id="closeSettings">×</button>
        </div>
        <div class="modal-body">
          <div class="modal-note">Used to estimate calories burned. Defaults used if blank.</div>
          <div class="setting-row">
            <label>Gender</label>
            <div class="seg-control">
              <button class="seg-btn ${(!p.gender||p.gender==='male')?'active':''}" data-field="gender" data-val="male">Male</button>
              <button class="seg-btn ${p.gender==='female'?'active':''}" data-field="gender" data-val="female">Female</button>
            </div>
          </div>
          <div class="setting-row">
            <label>Age</label>
            <input class="setting-input" id="inp-age" type="number" placeholder="25" value="${p.age||''}" min="10" max="99">
          </div>
          <div class="setting-row">
            <label>Weight</label>
            <div class="input-with-unit">
              <input class="setting-input" id="inp-weight" type="number" placeholder="${p.unit==='lbs'?'165':'75'}" value="${p.weight||''}">
              <div class="seg-control small">
                <button class="seg-btn ${(!p.unit||p.unit==='kg')?'active':''}" data-field="unit" data-val="kg">kg</button>
                <button class="seg-btn ${p.unit==='lbs'?'active':''}" data-field="unit" data-val="lbs">lbs</button>
              </div>
            </div>
          </div>
          <div class="setting-row">
            <label>Height</label>
            <div class="input-with-unit">
              <input class="setting-input" id="inp-height" type="number" placeholder="${p.heightUnit==='ft'?'5.9':'175'}" value="${p.height||''}">
              <div class="seg-control small">
                <button class="seg-btn ${(!p.heightUnit||p.heightUnit==='cm')?'active':''}" data-field="heightUnit" data-val="cm">cm</button>
                <button class="seg-btn ${p.heightUnit==='ft'?'active':''}" data-field="heightUnit" data-val="ft">ft</button>
              </div>
            </div>
          </div>
          <button class="save-btn" id="saveSettings">Save</button>
        </div>
      </div>
    </div>
  `;
}

function attachSettingsHandlers() {
  document.getElementById('closeSettings').onclick = () => { showSettings = false; render(); };
  document.getElementById('settingsOverlay').onclick = (e) => { if (e.target.id==='settingsOverlay') { showSettings=false; render(); } };
  document.querySelectorAll('.seg-btn[data-field]').forEach(btn => {
    btn.onclick = () => {
      state.profile[btn.dataset.field] = btn.dataset.val;
      saveState();
      document.getElementById('settingsOverlay').outerHTML = renderSettingsModal();
      attachSettingsHandlers();
    };
  });
  document.getElementById('saveSettings').onclick = () => {
    const age = document.getElementById('inp-age').value;
    const weight = document.getElementById('inp-weight').value;
    const height = document.getElementById('inp-height').value;
    if (age) state.profile.age = age;
    if (weight) state.profile.weight = weight;
    if (height) state.profile.height = height;
    saveState();
    showSettings = false;
    render();
  };
}

render();
function getSessionKey(phaseIdx, dayIdx) { return `${phaseIdx}-${dayIdx}`; }

function getAllSessions() {
  // Returns array of {phaseIdx, dayIdx, phaseName, dayName, weekKey, dateStr} sorted newest first
  const sessions = [];
  Object.keys(state.history).forEach(sessionKey => {
    const [p, d] = sessionKey.split('-').map(Number);
    const phase = PHASES[p];
    const day = phase && phase.days[d];
    if (!phase || !day) return;
    Object.keys(state.history[sessionKey]).forEach(wk => {
      sessions.push({ phaseIdx: p, dayIdx: d, phaseName: phase.name, dayName: day.name, focus: day.focus, weekKey: wk });
    });
  });
  sessions.sort((a, b) => b.weekKey.localeCompare(a.weekKey));
  return sessions;
}

function getStreakCount() {
  // Count consecutive weeks (from most recent) where at least one day was completed
  const weekSet = new Set();
  Object.values(state.history).forEach(wkMap => {
    Object.keys(wkMap).forEach(wk => weekSet.add(wk));
  });
  const weeks = Array.from(weekSet).sort().reverse();
  const currentWk = getWeekKey();
  let streak = 0;
  let expected = currentWk;
  for (const wk of weeks) {
    if (wk === expected) {
      streak++;
      expected = prevWeekKey(expected);
    } else break;
  }
  return streak;
}

function prevWeekKey(wk) {
  const [year, w] = wk.split('-W').map(Number);
  if (w === 1) return `${year-1}-W52`;
  return `${year}-W${String(w-1).padStart(2,'0')}`;
}

function getDayStreak() {
  // Count consecutive calendar days (today backwards) where at least one session was logged
  // Sessions are stored by week key — we need to know which dates had completions
  // We store completions by week key only, so we approximate: count sessions per week
  // and check if today's week and yesterday's weeks have sessions
  // For a true day streak we need date-level tracking — add dateKey to history entries
  const today = new Date();
  const dateKeys = new Set();
  // dateKey stored in history as "YYYY-MM-DD" alongside weekKey
  Object.values(state.history).forEach(wkMap => {
    Object.keys(wkMap).forEach(entry => {
      // entries can be true (old) or a dateKey string
      if (typeof wkMap[entry] === 'string') dateKeys.add(wkMap[entry]);
      else if (wkMap[entry] === true) {
        // legacy: we don't know the exact date, skip for streak
      }
    });
  });
  // Check consecutive days back from today
  let streak = 0;
  const d = new Date(today);
  while (true) {
    const dk = d.toISOString().slice(0, 10);
    if (dateKeys.has(dk)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function getTodayKey() { return new Date().toISOString().slice(0, 10); }

function getTotalSessions() {
  let count = 0;
  Object.values(state.history).forEach(wkMap => { count += Object.keys(wkMap).length; });
  return count;
}

function renderHabitTracker() {
  const sessions = getAllSessions();
  const streak = getStreakCount();
  const total = getTotalSessions();
  const dayStreak = getDayStreak();
  const accent = getCurrentPhase().accent;

  // Group sessions by week
  const byWeek = {};
  sessions.forEach(s => {
    if (!byWeek[s.weekKey]) byWeek[s.weekKey] = [];
    byWeek[s.weekKey].push(s);
  });

  let html = `
    <div class="habit-stats">
      <div class="habit-stat">
        <div class="habit-stat-num" style="color:${accent}">${streak}</div>
        <div class="habit-stat-label">Week streak</div>
      </div>
      <div class="habit-stat">
        <div class="habit-stat-num" style="color:${accent}">${total}</div>
        <div class="habit-stat-label">Sessions total</div>
      </div>
      <div class="habit-stat">
        <div class="habit-stat-num" style="color:${accent}">${dayStreak}</div>
        <div class="habit-stat-label">Days in a row</div>
      </div>
    </div>
  `;

  if (sessions.length === 0) {
    html += `<div class="habit-empty">Complete your first workout day to start tracking your history.</div>`;
  } else {
    Object.keys(byWeek).sort().reverse().forEach(wk => {
      const isCurrentWeek = wk === getWeekKey();
      html += `<div class="habit-week-label">${isCurrentWeek ? 'This week' : wk.replace('-W', ' · Week ')}</div>`;
      byWeek[wk].forEach(s => {
        html += `
          <div class="habit-session-card">
            <div class="habit-session-left">
              <div class="habit-session-day">${s.dayName}</div>
              <div class="habit-session-focus">${s.focus}</div>
            </div>
            <div class="habit-session-phase" style="color:${PHASES[s.phaseIdx].accent}">Phase ${s.phaseIdx+1}</div>
          </div>
        `;
      });
    });
  }

  return html;
}

</script>
